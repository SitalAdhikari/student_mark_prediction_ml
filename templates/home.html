<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Student's Mark Prediction</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;

            background:linear-gradient(
                -45deg,
                #0f172a,
                #1e293b,
                #312e81,
                #1e40af
            );

            background-size:400% 400%;
            animation:gradientBG 12s ease infinite;
        }

        @keyframes gradientBG{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        .login{
            width:100%;
            max-width:900px;

            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(20px);

            border:1px solid rgba(255,255,255,0.15);
            border-radius:24px;

            padding:40px;

            box-shadow:0 20px 50px rgba(0,0,0,.35);

            animation:fadeUp .8s ease;
        }

        @keyframes fadeUp{
            from{
                opacity:0;
                transform:translateY(40px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        h1{
            text-align:center;
            color:white;
            margin-bottom:10px;
            font-size:2.2rem;
            font-weight:700;
        }

        .subtitle{
            text-align:center;
            color:#cbd5e1;
            margin-bottom:30px;
        }

        .mb-3{
            margin-bottom:18px;
        }

        .form-label{
            display:block;
            margin-bottom:8px;
            color:white;
            font-weight:500;
        }

        .form-control{
            width:100%;
            padding:14px;
            border:none;
            outline:none;
            border-radius:12px;

            background:rgba(255,255,255,.12);
            color:white;
            font-size:15px;

            transition:.3s;
        }

        .form-control:focus{
            background:rgba(255,255,255,.18);
            box-shadow:0 0 0 3px rgba(99,102,241,.4);
        }

        .form-control::placeholder{
            color:#d1d5db;
        }

        select option{
            color:black;
        }

        .btn{
            width:100%;
            padding:15px;

            border:none;
            border-radius:12px;

            background:linear-gradient(
                135deg,
                #2563eb,
                #4f46e5
            );

            color:white;
            font-size:16px;
            font-weight:600;

            cursor:pointer;
            transition:.3s;
        }

        .btn:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 25px rgba(79,70,229,.45);
        }

        .result{
            margin-top:25px;
            padding:18px;

            border-radius:14px;

            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.1);

            text-align:center;

            color:white;
            font-size:22px;
            font-weight:600;
        }

        @media(max-width:768px){
            .login{
                padding:25px;
            }

            h1{
                font-size:1.7rem;
            }
        }
    </style>
</head>

<body>

<div class="login">

    <h1>Math Student's Mark Prediction</h1>
    <p class="subtitle">
        Predict student mathematics performance using machine learning
    </p>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-control" name="gender" required>
                <option selected disabled value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Race or Ethnicity</label>
            <select class="form-control" name="ethnicity" required>
                <option selected disabled value="">Select Ethnicity</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Parental Level of Education</label>
            <select class="form-control"
                    name="parental_level_of_education"
                    required>

                <option selected disabled value="">
                    Select Parent Education
                </option>

                <option value="associate's degree">
                    Associate's Degree
                </option>

                <option value="bachelor's degree">
                    Bachelor's Degree
                </option>

                <option value="high school">
                    High School
                </option>

                <option value="master's degree">
                    Master's Degree
                </option>

                <option value="some college">
                    Some College
                </option>

                <option value="some high school">
                    Some High School
                </option>

            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Lunch Type</label>
            <select class="form-control" name="lunch" required>
                <option selected disabled value="">Select Lunch Type</option>
                <option value="free/reduced">Free / Reduced</option>
                <option value="standard">Standard</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Test Preparation Course (Syllabus)</label>
            <select class="form-control"
                    name="test_preparation_course"
                    required>

                <option selected disabled value="">
                    Select Course
                </option>

                <option value="none">None</option>
                <option value="completed">Completed</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">
                Reading Score (0 - 100)
            </label>

            <input
                class="form-control"
                type="number"
                name="reading_score"
                min="0"
                max="100"
                placeholder="Enter Reading Score"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">
                Writing Score (0 - 100)
            </label>

            <input
                class="form-control"
                type="number"
                name="writing_score"
                min="0"
                max="100"
                placeholder="Enter Writing Score"
                required>
        </div>

        <div class="mb-3">
            <input
                class="btn"
                type="submit"
                value="Predict Mathematics Score">
        </div>

    </form>

    <div class="result">
        Predicted Mathematics Score: {{ results }}
    </div>

</div>

</body>
</html>
